name: Create a release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Generate next tag
        id: gen-tag
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag-prefix: "v"
          version_format: ${major}.${minor}.${patch}

      - name: Display generated tag
        run: |
          echo "Generated tag: ${{ steps.gen-tag.outputs.version_tag }}"
