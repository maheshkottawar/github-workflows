name: Create a release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Generate next tag
        id: gen-tag
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag-prefix: "v"
          version_format: ${major}.${minor}.${patch}

      - name: Display generated tag
        run: |
          echo "Generated tag: ${{ steps.gen-tag.outputs.version_tag }}"
          echo "Previous version: ${{ steps.gen-tag.outputs.previous_version }}"
          echo "Major: ${{ steps.gen-tag.outputs.major }}"
          echo "Minor: ${{ steps.gen-tag.outputs.minor }}"
          echo "Patch: ${{ steps.gen-tag.outputs.patch }}"

      - name: setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create new tag for current HEAD
        env:
          NEXT_TAG: ${{ steps.gen-tag.outputs.version_tag }}
        run: |
          git tag $NEXT_TAG
          git push origin $NEXT_TAG

      - name: Create GitHub release and release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOUS_VERSION: ${{ steps.gen-tag.outputs.previous_version }}
          RELEASE_TAG: ${{ steps.gen-tag.outputs.version_tag }}
        run: |
          echo "Creating release **$RELEASE_TAG**..." >> $GITHUB_STEP_SUMMARY

          NOTES_START_FLAG=""

          # Add v prefix to previous version to match tag naming convention
          if [[ -n "$PREVIOUS_VERSION" ]]; then
            PREVIOUS_TAG="v${PREVIOUS_VERSION}"
            echo "Previous version: $PREVIOUS_VERSION"
            echo "Formatted previous tag: $PREVIOUS_TAG"
            
            # Verify tag exists locally or on remote
            if git rev-parse "$PREVIOUS_TAG" >/dev/null 2>&1; then
              echo "Previous tag validated: $PREVIOUS_TAG"
              NOTES_START_FLAG="--notes-start-tag $PREVIOUS_TAG"
            else
              echo "Warning: Previous tag '$PREVIOUS_TAG' not found, generating notes without reference"
            fi
          else
            echo "No previous version found, generating notes from repository history"
          fi

          # Create release with or without previous tag reference
          if [[ -n "$NOTES_START_FLAG" ]]; then
            url=$(gh release create $RELEASE_TAG --target main --generate-notes $NOTES_START_FLAG)
          else
            url=$(gh release create $RELEASE_TAG --target main --generate-notes)
          fi

          echo "Successfully released **$RELEASE_TAG**! View it [here]($url)." >> $GITHUB_STEP_SUMMARY

      - name: Move major floating tag
        env:
          MAJOR_TAG: ${{ format('v{0}', steps.gen-tag.outputs.major) }}
          RELEASE_TAG: ${{ steps.gen-tag.outputs.version_tag }}
        run: |
          git tag -f $MAJOR_TAG
          git push -f origin $MAJOR_TAG
          echo "Major tag **$MAJOR_TAG** now points to release tag **$RELEASE_TAG**." >> $GITHUB_STEP_SUMMARY
