name: release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get bump version
        id: bump_label
        if: ${{ github.event_name == 'pull_request' }}
        uses: SamirMarin/get-labels-action@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          label_key: bump
          label_value_order: "patch,minor,major,ignore"
          default_label_value: patch

      - name: Set default bump for push events
        id: bump_value
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "bump_version=${{ steps.bump_label.outputs.label_value }}" >> $GITHUB_OUTPUT
          else
            echo "bump_version=patch" >> $GITHUB_OUTPUT
          fi

      - name: create tag to release
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ steps.bump_value.outputs.bump_version }}
          dry_run: ${{ github.event_name == 'pull_request' }}
          tag_prefix: v

      - name: create release
        uses: ncipollo/release-action@v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
